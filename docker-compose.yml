services:
  # ---------------------------------------------------------------------------
  # PostgreSQL – OLTP database with ltree & pgvector extensions
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: erp_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erp_ai}
      POSTGRES_USER: ${POSTGRES_USER:-erp_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # INTERNAL ONLY – not exposed to host (Cloudflared policy)
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp_admin} -d ${POSTGRES_DB:-erp_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Kafka – Event-driven message broker (KRaft mode, no Zookeeper)
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.9.0
    container_name: erp_ai_kafka
    restart: unless-stopped
    environment:
      # KRaft mode (no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    # INTERNAL ONLY – not exposed to host (Cloudflared policy)
    expose:
      - "9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # ERP AI Application – Rust Axum server
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp_ai_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-erp_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-erp_ai}
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      APP_HOST: 0.0.0.0
      APP_PORT: 3000
      RUST_LOG: info
      GOOGLE_AI_KEY: ${GOOGLE_AI_KEY}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-deepseek-r1:7b}
      OLLAMA_BASE_URL: http://ollama:11434
    # Only expose to localhost for Cloudflared tunnel
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Ollama – Local AI Provider
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: erp_ai_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # INTERNAL ONLY – not exposed to host (Cloudflared policy)
    # Expose for app service and pull-model helper
    expose:
      - "11434"
    # Map to host's localhost only if needed for external debugging
    ports:
      - "127.0.0.1:11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Helper to pull the model on startup
  ollama-pull-model:
    image: ollama/ollama:latest
    container_name: erp_ai_ollama_pull
    environment:
      - OLLAMA_HOST=ollama:11434
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: /bin/sh
    command: -c "ollama pull ${OLLAMA_MODEL:-deepseek-r1:7b}"
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  kafka_data:
    driver: local
  ollama_data:
    driver: local
